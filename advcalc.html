<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cut Corner Calculator</title>
<style>
  body {
    font-family: system-ui, Arial, sans-serif;
    background: #f6f8fb;
    color: #111827;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  .box {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  input {
    width: 100%;
    padding: 10px;
    font-size: 18px;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin-top: 10px;
  }
  button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    background: #2563eb;
    color: white;
    cursor: pointer;
  }
  button:hover {
    background: #1d4ed8;
  }
  .result {
    font-size: 22px;
    font-weight: 600;
    margin-top: 15px;
  }
  .small {
    color: #6b7280;
    font-size: 14px;
    margin-top: 5px;
  }
</style>
</head>
<body>
  <div class="box">
    <h2>Cut-Corner Inset (45°)</h2>
    <div id="result" class="result">Enter a number and press Calculate</div>
    <div id="fraction" class="small"></div>

    <input id="input" type="text" inputmode="decimal" placeholder="e.g. 31 or 25" />
    <button id="calcBtn">Calculate</button>

    <div class="small">Formula: inset = diagonal ÷ √2</div>
  </div>

<script>
const input = document.getElementById('input');
const result = document.getElementById('result');
const fraction = document.getElementById('fraction');
const button = document.getElementById('calcBtn');

function gcd(a,b){ return b ? gcd(b, a % b) : a; }

function toMixedFraction(val){
  const whole = Math.floor(val);
  let frac = val - whole;
  let num = Math.round(frac * 8);
  let den = 8;
  if(num === 0) return `${whole}"`;
  if(num === den) return `${whole + 1}"`;
  const g = gcd(num, den);
  num /= g; den /= g;
  return `${whole > 0 ? whole + " " : ""}${num}/${den}"`;
}

button.addEventListener('click', () => {
  const d = parseFloat(input.value);
  if (isNaN(d) || d <= 0) {
    result.textContent = "Please enter a valid number";
    fraction.textContent = "";
    return;
  }
  const inset = d / Math.SQRT2;
  const insetRounded = Math.round(inset * 8) / 8;
  result.textContent = `${insetRounded.toFixed(3)}"`;
  fraction.textContent = `≈ ${toMixedFraction(insetRounded)}  (raw: ${inset.toFixed(4)}")`;
});
</script>
</body>
</html>
